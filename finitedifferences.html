<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finite Differences Table & Interpolation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container" style="display: block; max-width: 1200px; margin: 20px auto;">
    
    <a href="index.html" style="display:inline-block; margin-bottom: 20px; text-decoration: none; color: var(--primary-color); font-weight: bold;">← Back to MathLab Hub</a>

    <div class="container" style="margin: 0;">
        <div class="control-panel">
            <h2>Data Input</h2>
            <p style="color: var(--text-muted); margin-bottom: 15px; font-size: 0.9em;">
                Enter your discrete data points separated by commas. Both lists must have the same number of values.
            </p>
            
            <div class="input-group">
                <label for="x-values">X Values (Independent):</label>
                <input type="text" id="x-values" placeholder="e.g., 10, 20, 30, 40, 50" value="10, 20, 30, 40, 50">
            </div>

            <div class="input-group">
                <label for="y-values">Y Values (Dependent / f(x)):</label>
                <input type="text" id="y-values" placeholder="e.g., 46, 66, 81, 93, 101" value="46, 66, 81, 93, 101">
            </div>

             <div class="input-group" style="margin-top: 25px; border-top: 1px solid var(--border-color); padding-top: 20px;">
                <label for="interpolate-x">Find Y when X = (Interpolate):</label>
                <input type="number" id="interpolate-x" placeholder="e.g., 15" value="15" style="border-color: var(--primary-color);">
                
                <div class="methods-group" style="margin-top: 15px; background: #f8fafc; padding: 15px; border-radius: 8px; border: 1px solid var(--border-color);">
                    <h4 style="margin-top: 0; color: var(--text-main); font-size: 0.95em;">Select Interpolation Method:</h4>
                    <label><input type="radio" name="interp-method" value="auto" checked> 🤖 Auto-Select (Best Fit)</label>
                    <label><input type="radio" name="interp-method" value="forward"> ↗️ Newton's Forward</label>
                    <label><input type="radio" name="interp-method" value="backward"> ↘️ Newton's Backward</label>
                    <label><input type="radio" name="interp-method" value="stirling"> 🎯 Stirling's Central</label>
                          <label style="display:block;"><input type="radio" name="interp-method" value="bessel"> ⚖️ Bessel's Central</label>
                          
                 <label style="display:block;"><input type="radio" name="interp-method" value="lagrange"> 🔗 Lagrange's Formula (Any Data)</label>         
                </div>
                
                
            </div>

            <button id="generate-table-btn" style="margin-top: 20px;">Generate Table & Interpolate</button>
        </div>

        <div class="results-panel">
            <h2>Finite Difference Table</h2>
            <div id="table-container">
                <p style="text-align:center; color:var(--text-muted); padding-top:40px;">Enter data to generate the table.</p>
            </div>
            
            <div id="interpolation-result" style="margin-top: 30px;"></div>
        </div>
        
    </div>
</div>



<script src="./finitedifference/newtonforward.js"></script>
<script src="./finitedifference/newtonBackward.js"></script>
<script src="./finitedifference/stirling.js"></script>
<script src="./finitedifference/bessel.js"></script>
<script src="./finitedifference/lagrange.js"></script>
<script src="finitedifferences.js"></script>

</body>
</html>
